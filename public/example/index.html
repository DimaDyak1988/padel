<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Club — Пользователи</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource-inter@4.5.11/index.css">
  <style>
    /* ===== CSS RESET & BASE ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #f0f0f5;
      --color-surface: #ffffff;
      --color-text-primary: #1a1a2e;
      --color-text-secondary: #6b7280;
      --color-text-muted: #9ca3af;
      --color-border: #e5e7eb;
      --color-accent: #1a1a2e;
      --color-accent-hover: #2d2d44;
      --color-danger: #ef4444;
      --color-danger-hover: #dc2626;
      --color-danger-bg: #fef2f2;
      --color-success: #22c55e;
      --color-star: #f59e0b;
      --color-star-empty: #d1d5db;
      --color-header-bg: #ffffff;
      --color-card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --color-card-shadow-hover: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --transition-fast: 0.15s ease;
      --transition-normal: 0.25s ease;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== LAYOUT ===== */
    .layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .layout__main {
      flex: 1;
      padding: 32px 40px 48px;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
    }

    /* ===== HEADER ===== */
    .header {
      background: var(--color-header-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--color-text-primary);
    }

    .header__logo-icon {
      width: 36px;
      height: 36px;
      background: var(--color-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header__logo-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header__logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header__icon-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: background var(--transition-fast), color var(--transition-fast);
      position: relative;
    }

    .header__icon-btn:hover {
      background: #f3f4f6;
      color: var(--color-text-primary);
    }

    .header__icon-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header__icon-btn--badge::after {
      content: '';
      position: absolute;
      top: 8px;
      right: 8px;
      width: 7px;
      height: 7px;
      background: var(--color-danger);
      border-radius: 50%;
      border: 2px solid var(--color-header-bg);
    }

    .header__divider {
      width: 1px;
      height: 28px;
      background: var(--color-border);
      margin: 0 8px;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-header__title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .page-header__subtitle {
      font-size: 15px;
      color: var(--color-text-secondary);
      font-weight: 400;
    }

    /* ===== AVATAR ===== */
    .avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: #e5e7eb;
      position: relative;
    }

    .avatar--xs { width: 28px; height: 28px; }
    .avatar--sm { width: 36px; height: 36px; }
    .avatar--md { width: 44px; height: 44px; }
    .avatar--lg { width: 80px; height: 80px; }
    .avatar--xl { width: 100px; height: 100px; }
    .avatar--2xl { width: 120px; height: 120px; }

    .avatar__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar--online::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 12px;
      height: 12px;
      background: var(--color-success);
      border-radius: 50%;
      border: 2px solid var(--color-header-bg);
    }

    .avatar--placeholder {
      background: #d1d5db;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
    }

    .avatar--placeholder.avatar--lg { font-size: 28px; }
    .avatar--placeholder.avatar--xl { font-size: 36px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      text-decoration: none;
      line-height: 1;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .btn--primary {
      background: var(--color-accent);
      color: #fff;
      padding: 10px 20px;
    }

    .btn--primary:hover {
      background: var(--color-accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26,26,46,0.25);
    }

    .btn--primary:active {
      transform: translateY(0);
    }

    .btn--outline {
      background: var(--color-surface);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
      padding: 9px 18px;
    }

    .btn--outline:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .btn--ghost {
      background: transparent;
      color: var(--color-text-secondary);
      padding: 9px 14px;
    }

    .btn--ghost:hover {
      background: #f3f4f6;
      color: var(--color-text-primary);
    }

    .btn--danger-outline {
      background: var(--color-surface);
      color: var(--color-danger);
      border: 1px solid #fecaca;
      padding: 9px 18px;
    }

    .btn--danger-outline:hover {
      background: var(--color-danger-bg);
      border-color: var(--color-danger);
    }

    .btn--danger {
      background: var(--color-danger);
      color: #fff;
      padding: 9px 18px;
    }

    .btn--danger:hover {
      background: var(--color-danger-hover);
    }

    .btn--lg {
      padding: 12px 24px;
      font-size: 15px;
      border-radius: var(--radius-md);
    }

    .btn--lg svg {
      width: 18px;
      height: 18px;
    }

    .btn--sm {
      padding: 7px 14px;
      font-size: 13px;
    }

    .btn--block {
      width: 100%;
    }

    /* ===== STAT CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow var(--transition-normal), transform var(--transition-normal);
    }

    .stat-card:hover {
      box-shadow: var(--color-card-shadow-hover);
      transform: translateY(-2px);
    }

    .stat-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .stat-card__icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--color-text-secondary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .stat-card__label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--color-text-muted);
      margin-bottom: 2px;
    }

    .stat-card__value {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--color-text-primary);
      line-height: 1.1;
    }

    /* ===== SEARCH & FILTERS ===== */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 8px;
    }

    .toolbar__search {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: transparent;
    }

    .toolbar__search svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--color-text-muted);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .toolbar__search input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font-family);
      font-size: 14px;
      color: var(--color-text-primary);
      background: transparent;
    }

    .toolbar__search input::placeholder {
      color: var(--color-text-muted);
    }

    .toolbar__actions {
      display: flex;
      gap: 8px;
    }

    /* ===== RATING STARS ===== */
    .rating {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .rating__label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--color-text-muted);
    }

    .rating__stars {
      display: flex;
      gap: 2px;
    }

    .rating__star {
      width: 18px;
      height: 18px;
      fill: var(--color-star-empty);
      transition: fill var(--transition-fast);
    }

    .rating__star--filled {
      fill: var(--color-star);
    }

    .rating__value {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-text-primary);
    }

    /* ===== USER CARD ===== */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .user-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: 28px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow var(--transition-normal), transform var(--transition-normal);
      position: relative;
      overflow: hidden;
    }

    .user-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--color-accent), #4f46e5);
      opacity: 0;
      transition: opacity var(--transition-normal);
    }

    .user-card:hover {
      box-shadow: var(--color-card-shadow-hover);
      transform: translateY(-3px);
    }

    .user-card:hover::before {
      opacity: 1;
    }

    .user-card__avatar {
      margin-bottom: 14px;
    }

    .user-card__name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
      text-align: center;
    }

    .user-card__telegram {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 18px;
    }

    .user-card__telegram svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .user-card__rating {
      background: #f9fafb;
      border-radius: var(--radius-md);
      padding: 14px 20px;
      width: 100%;
      margin-bottom: 18px;
    }

    .user-card__contacts {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }

    .user-card__contact {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .user-card__contact svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .user-card__actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .user-card__actions .btn {
      flex: 1;
    }

    /* ===== MODAL (для "Добавить участника") ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-normal), visibility var(--transition-normal);
    }

    .modal-overlay--active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 100%;
      max-width: 440px;
      transform: translateY(20px) scale(0.97);
      transition: transform var(--transition-normal);
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    }

    .modal-overlay--active .modal {
      transform: translateY(0) scale(1);
    }

    .modal__title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal__field {
      margin-bottom: 14px;
    }

    .modal__field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    .modal__field input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-family: var(--font-family);
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition-fast);
    }

    .modal__field input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(26,26,46,0.08);
    }

    .modal__actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal__actions .btn { flex: 1; }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--color-accent);
      color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: translateX(120%);
      transition: transform var(--transition-normal);
      max-width: 320px;
    }

    .toast--visible {
      transform: translateX(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .users-grid { grid-template-columns: repeat(2, 1fr); }
      .layout__main { padding: 24px 20px 40px; }
      .header { padding: 0 20px; }
    }

    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr; }
      .users-grid { grid-template-columns: 1fr; }
      .page-header { flex-direction: column; gap: 16px; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar__actions { justify-content: flex-end; }
      .header__logo-text { font-size: 16px; }
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-card {
      animation: fadeInUp 0.4s ease both;
    }
    .user-card:nth-child(1) { animation-delay: 0.05s; }
    .user-card:nth-child(2) { animation-delay: 0.1s; }
    .user-card:nth-child(3) { animation-delay: 0.15s; }

    .stat-card {
      animation: fadeInUp 0.4s ease both;
    }
    .stat-card:nth-child(1) { animation-delay: 0s; }
    .stat-card:nth-child(2) { animation-delay: 0.05s; }
    .stat-card:nth-child(3) { animation-delay: 0.1s; }
    .stat-card:nth-child(4) { animation-delay: 0.15s; }
  </style>
</head>
<body>

<div class="layout">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <a href="#" class="header__logo">
      <div class="header__logo-icon">
        <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <span class="header__logo-text">Padel Club</span>
    </a>

    <div class="header__actions">
      <button class="header__icon-btn header__icon-btn--badge" title="Уведомления">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <button class="header__icon-btn" title="Настройки">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="header__divider"></div>
      <div class="avatar avatar--sm avatar--online">
        <img class="avatar__img" src="https://image.qwenlm.ai/public_source/61692555-e463-407c-9672-ec86504e1b9c/1dc19fcc5-0c36-4854-8647-277b3ac74b55.png" alt="Администратор">
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="layout__main">

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1 class="page-header__title">Пользователи</h1>
        <p class="page-header__subtitle">Управление участниками клуба и их рейтингом</p>
      </div>
      <button class="btn btn--primary btn--lg" id="btnAddUser">
        <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Добавить участника
      </button>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <div class="stat-card__label">Всего участников</div>
          <div class="stat-card__value">128</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div>
          <div class="stat-card__label">Активных сегодня</div>
          <div class="stat-card__value">14</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div>
          <div class="stat-card__label">Средний рейтинг</div>
          <div class="stat-card__value">4.2</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div>
          <div class="stat-card__label">Новых (за неделю)</div>
          <div class="stat-card__value">+5</div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar__search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Поиск по имени или телеграму..." id="searchInput">
      </div>
      <div class="toolbar__actions">
        <button class="btn btn--outline" id="btnFilters">
          <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Фильтры
        </button>
        <button class="btn btn--outline" id="btnSort">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
          По рейтингу
        </button>
      </div>
    </div>

    <!-- Users Grid -->
    <div class="users-grid" id="usersGrid">
      <!-- Cards rendered by JS -->
    </div>

  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modal__title">Добавить участника</h2>
    <div class="modal__field">
      <label>Имя и фамилия</label>
      <input type="text" placeholder="Иван Петров" id="modalName">
    </div>
    <div class="modal__field">
      <label>Telegram</label>
      <input type="text" placeholder="@ivan_padel" id="modalTelegram">
    </div>
    <div class="modal__field">
      <label>Email</label>
      <input type="email" placeholder="ivan@example.com" id="modalEmail">
    </div>
    <div class="modal__field">
      <label>Телефон</label>
      <input type="tel" placeholder="+7 (999) 000-00-00" id="modalPhone">
    </div>
    <div class="modal__actions">
      <button class="btn btn--outline" id="btnCancel">Отмена</button>
      <button class="btn btn--primary" id="btnSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ===== DATA =====
  const users = [
    {
      id: 1,
      name: 'Александр Волков',
      telegram: '@alex_padel',
      email: 'volkov.a@example.com',
      phone: '+7 (999) 000-00-00',
      rating: 4.5,
      avatar: 'https://image.qwenlm.ai/public_source/61692555-e463-407c-9672-ec86504e1b9c/16823704f-8197-457a-92e0-d3e03872669d.png'
    },
    {
      id: 2,
      name: 'Мария Кузнецова',
      telegram: '@masha_k',
      email: 'm.kuznetsova@example.com',
      phone: '+7 (999) 000-00-00',
      rating: 5.0,
      avatar: 'https://image.qwenlm.ai/public_source/61692555-e463-407c-9672-ec86504e1b9c/1d955c9c2-ffe9-4cf4-ac05-18cd9d8e5271.png'
    },
    {
      id: 3,
      name: 'Дмитрий Иванов',
      telegram: '@dima_padel_pro',
      email: 'd.ivanov@example.com',
      phone: '+7 (999) 000-00-00',
      rating: 3.5,
      avatar: 'https://image.qwenlm.ai/public_source/61692555-e463-407c-9672-ec86504e1b9c/11ff69951-94ea-40e0-ace0-a3a85c6e539d.png'
    }
  ];

  // ===== RENDER STARS =====
  function renderStars(rating) {
    const full = Math.floor(rating);
    const half = rating % 1 >= 0.5 ? 1 : 0;
    const empty = 5 - full - half;
    let html = '';
    for (let i = 0; i < full; i++) {
      html += '<svg class="rating__star rating__star--filled" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    }
    if (half) {
      html += '<svg class="rating__star rating__star--filled" viewBox="0 0 24 24" style="opacity:0.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    }
    for (let i = 0; i < empty; i++) {
      html += '<svg class="rating__star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    }
    return html;
  }

  // ===== RENDER USER CARD =====
  function renderUserCard(user) {
    return `
      <div class="user-card" data-id="${user.id}">
        <div class="user-card__avatar">
          <div class="avatar avatar--xl">
            <img class="avatar__img" src="${user.avatar}" alt="${user.name}">
          </div>
        </div>
        <div class="user-card__name">${user.name}</div>
        <div class="user-card__telegram">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
          ${user.telegram}
        </div>
        <div class="user-card__rating">
          <div class="rating">
            <span class="rating__label">Рейтинг</span>
            <div class="rating__stars">${renderStars(user.rating)}</div>
            <span class="rating__value">${user.rating.toFixed(1)}</span>
          </div>
        </div>
        <div class="user-card__contacts">
          <div class="user-card__contact">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            ${user.email}
          </div>
          <div class="user-card__contact">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ${user.phone}
          </div>
        </div>
        <div class="user-card__actions">
          <button class="btn btn--outline btn--edit" data-id="${user.id}">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Редактировать
          </button>
          <button class="btn btn--danger-outline btn--delete" data-id="${user.id}">
            Удалить
          </button>
        </div>
      </div>
    `;
  }

  // ===== RENDER ALL =====
  function renderUsers(list) {
    document.getElementById('usersGrid').innerHTML = list.map(renderUserCard).join('');
    attachCardEvents();
  }

  // ===== TOAST =====
  function showToast(message) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('toast--visible'));
    setTimeout(() => {
      toast.classList.remove('toast--visible');
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  // ===== MODAL =====
  function openModal() {
    document.getElementById('modalOverlay').classList.add('modal-overlay--active');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('modal-overlay--active');
    document.getElementById('modalName').value = '';
    document.getElementById('modalTelegram').value = '';
    document.getElementById('modalEmail').value = '';
    document.getElementById('modalPhone').value = '';
  }

  // ===== CARD EVENTS =====
  function attachCardEvents() {
    document.querySelectorAll('.btn--edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        const user = users.find(u => u.id === id);
        showToast(`Редактирование: ${user.name}`);
      });
    });
    document.querySelectorAll('.btn--delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        const user = users.find(u => u.id === id);
        const idx = users.findIndex(u => u.id === id);
        users.splice(idx, 1);
        renderUsers(users);
        showToast(`Удалён: ${user.name}`);
      });
    });
  }

  // ===== SEARCH =====
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    if (!q) { renderUsers(users); return; }
    const filtered = users.filter(u =>
      u.name.toLowerCase().includes(q) || u.telegram.toLowerCase().includes(q)
    );
    renderUsers(filtered);
  });

  // ===== SORT =====
  let sortAsc = false;
  document.getElementById('btnSort').addEventListener('click', () => {
    sortAsc = !sortAsc;
    users.sort((a, b) => sortAsc ? a.rating - b.rating : b.rating - a.rating);
    renderUsers(users);
    showToast(sortAsc ? 'Сортировка: по возрастанию' : 'Сортировка: по убыванию');
  });

  // ===== FILTERS (placeholder) =====
  document.getElementById('btnFilters').addEventListener('click', () => {
    showToast('Фильтры скоро будут доступны');
  });

  // ===== MODAL EVENTS =====
  document.getElementById('btnAddUser').addEventListener('click', openModal);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('btnSave').addEventListener('click', () => {
    const name = document.getElementById('modalName').value.trim();
    const telegram = document.getElementById('modalTelegram').value.trim();
    const email = document.getElementById('modalEmail').value.trim();
    const phone = document.getElementById('modalPhone').value.trim();
    if (!name) { showToast('Введите имя'); return; }
    const newUser = {
      id: Date.now(),
      name,
      telegram: telegram || '@unknown',
      email: email || '—',
      phone: phone || '—',
      rating: 0,
      avatar: 'https://image.qwenlm.ai/public_source/61692555-e463-407c-9672-ec86504e1b9c/1dc19fcc5-0c36-4854-8647-277b3ac74b55.png'
    };
    users.push(newUser);
    renderUsers(users);
    closeModal();
    showToast(`Добавлен: ${name}`);
  });

  // ===== INIT =====
  renderUsers(users);
</script>

</body>
</html>
